<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Restaurante El Sabor Peruano - Jonel & Esteban</title>
    <style>
        .normal {
            color: black;
        }

        .bajo {
            color: orange;
            font-weight: bold;
        }

        .agotado {
            color: red;
            font-weight: bold;
        }

        .procesando {
            color: blue;
            font-weight: bold;
        }

        .exito {
            color: green;
            font-weight: bold;
        }

        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Menú del Restaurante</h1>
    <button id="btnMostrar">Mostrar menú</button>
    <button id="btnAgregar">Agregar plato demo</button>

    <hr>
    <h2>Herramientas</h2>
    <input id="inputBuscar" placeholder="Buscar plato por nombre" />
    <input id="inputCantidad" placeholder="Cantidad" type="number" />
    <button id="btnBuscar">Buscar</button>
    <button id="btnVender">Vender</button>
    <button id="btnStockBajo">Ver stock bajo (&lt;= 3)</button>
    <button id="btnResumen">Ver resumen</button>

    <div id="output"></div>

    <!-- Día 6: módulos ES6 - solo main.js como punto de entrada -->
    <script type="module" src="./main.js"></script>
</body>

</html>
